<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Lite Pro</title>
    <link rel="stylesheet" href="../wwwroot/styles/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<style>
    .btn-pub {
  display: inline-flex;
  align-items: center;
  gap: 8px;

  background: linear-gradient(135deg, #25d366, #128c7e);
  color: white;
  text-decoration: none;

  padding: 12px 18px;
  border-radius: 25px;

  font-size: 14px;
  font-weight: 600;

  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition: all 0.3s ease;

  margin: 10px;
}

/* hover effet smooth */
.btn-pub:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* click effet */
.btn-pub:active {
  transform: scale(0.95);
}

/* icône */
.btn-pub i {
  font-size: 14px;
}
</style>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile" style="display: flex; gap: 1rem; align-items: center;">
                    <div class="avatar-wrapper">
                        <a href="../pages/profil.html">
                            <img id="img" src="https://i.pravatar.cc/150?u=me" alt="Mon Profil">
                        </a>
                        <span class="status-dot online"></span>
                    </div>
                    <p id="name"></p>
                </div>
                <div class="header-actions">
                    <button class="icon-btn"><i data-lucide="circle-dashed"></i></button>
                    <button class="icon-btn" id="newChatBtn" title="Nouvelle discussion">
                        <i data-lucide="message-square-plus"></i>
                    </button>
                    <button class="icon-btn"><i data-lucide="more-vertical"></i></button>
                    <button class="icon-btn" id="logoutBtn" title="Déconnexion">
                        <i data-lucide="log-out"></i>
                    </button>
                </div>
            </header>
            <a href="createPub.html" class="btn-pub">
                <i class="fas fa-plus"></i>
                Nouvelle publication
            </a>

            <div class="search-container">
                <div class="search-bar">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="contactSearch" placeholder="Rechercher ou démarrer une discussion">
                </div>
            </div>

            <nav class="chat-list custom-scrollbar" id="conversationList"></nav>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <div class="current-contact">
                    <img id="currentAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar-sm" alt="">
                <div class="contact-details">
                    <h3 id="currentName">Sélectionnez une discussion</h3>
                    <span class="status-text" id="currentStatus"></span>
                </div>
            </div>
                <div class="chat-tools">
                    <button class="icon-btn"><i data-lucide="video"></i></button>
                    <button class="icon-btn"><i data-lucide="phone"></i></button>
                    <div class="v-divider"></div>
                    <button class="icon-btn"><i data-lucide="search"></i></button>
                </div>
            </header>

            <section class="messages-viewport custom-scrollbar" id="chatDisplay"></section>

            <footer class="input-container">
                <button class="tool-btn"><i data-lucide="plus"></i></button>
                <div class="input-pill">
                    <button class="tool-btn"><i data-lucide="smile"></i></button>
                    <input type="text" id="messageInput" placeholder="Tapez un message...">
                </div>
                <button class="send-btn" id="sendBtn">
                    <i data-lucide="mic" id="actionIcon"></i>
                </button>
            </footer>
        </main>
    </div>

    <!-- PROFIL MODAL -->
<div class="profile-modal hidden" id="profileModal">
  <div class="profile-backdrop" id="profileBackdrop"></div>

  <div class="profile-card">
    <button class="profile-close" id="profileClose" title="Fermer">✕</button>

    <div class="profile-top">
      <img id="profileAvatar" class="profile-avatar" src="" alt="Photo">
      <div class="profile-main">
        <h2 id="profileName"></h2>
        <p class="profile-sub" id="profilePhone"></p>
      </div>
    </div>

    <div class="profile-section">
  <h4>Infos</h4>

  <div class="profile-row">
    <span class="profile-label">Téléphone</span>
    <span class="profile-value" id="profilePhone2"></span>
  </div>

  <div class="profile-row">
    <span class="profile-label">Statut</span>
    <span class="profile-value" id="profileStatus"></span>
  </div>
</div>
    </div>
  </div>
</div>

   <script src="/socket.io/socket.io.js" defer></script>
   <script src="../wwwroot/js/chat.js" defer></script>
   <script src="../wwwroot/js/logout.js" defer></script>

   <script>
  lucide.createIcons();
   </script>
</body>
</html>
