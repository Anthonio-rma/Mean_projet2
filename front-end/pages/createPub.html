<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Publications</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; background-color: #e5ddd5; }
  header { background-color: #075e54; color: white; padding: 10px; text-align: center; }
  #btnToggleForm { background-color: #25d366; border: none; color: white; padding: 10px 20px; margin: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
  #formContainer { display: none; background-color: white; padding: 15px; margin: 10px; border-radius: 5px; }
  input, textarea { width: 100%; padding: 8px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
  button[type="submit"], button#cancel { border: none; padding: 10px 15px; margin-top: 5px; border-radius: 5px; cursor: pointer; }
  button[type="submit"] { background-color: #075e54; color: white; }
  #cancel { background-color: #ff3b30; color: white; margin-left: 5px; }
  .publication { background-color: #dcf8c6; margin: 10px; padding: 10px; border-radius: 10px; }
  .publication img { max-width: 200px; display: block; margin-top: 10px; border-radius: 5px; }
</style>
</head>
<body>

<header style="display: flex; align-items: center; background-color: #075e54; color: white; padding: 10px;">
  <a href="../pages/message.html" style="color: white; text-decoration: none; font-size: 24px; margin-right: 10px;">&#8592;</a>
  <h1 style="margin: 0; font-size: 20px;">Mes Publications</h1>
</header>

<button id="btnToggleForm">Créer une publication</button>

<div id="formContainer">
  <form id="formPub">
    <input type="text" name="titre" placeholder="Titre" required>
    <textarea name="contenu" placeholder="Contenu" required></textarea>
    <input type="text" name="hashtags" placeholder="Hashtags, séparés par ,">
    <input type="file" name="image"><br>
    <button type="submit">Publier</button>
    <button type="button" id="cancel">Annuler</button>
  </form>
</div>

<div id="publications"></div>

<script>
const formContainer = document.getElementById('formContainer');
const btnToggle = document.getElementById('btnToggleForm');
const cancelBtn = document.getElementById('cancel');
const form = document.getElementById('formPub');
const pubsDiv = document.getElementById('publications');

// Afficher / cacher le formulaire
btnToggle.addEventListener('click', () => {
  formContainer.style.display = 'block';
  btnToggle.style.display = 'none';
  pubsDiv.style.display = 'none'; // 🔹 cacher les publications
});

cancelBtn.addEventListener('click', () => {
  formContainer.style.display = 'none';
  btnToggle.style.display = 'block';
  pubsDiv.style.display = 'block'; // 🔹 réafficher les publications
  form.reset();
});

// Soumettre le formulaire
form.addEventListener('submit', async e => {
  e.preventDefault();
  const formData = new FormData(form);

  const res = await fetch('/api/publications', {
    method: 'POST',
    body: formData
  });
  const data = await res.json();
  if(data.error) return alert(data.error);

  // cacher formulaire après publication et réafficher les pubs
  formContainer.style.display = 'none';
  btnToggle.style.display = 'block';
  pubsDiv.style.display = 'block';
  form.reset();

  loadPublications();
});

// Charger toutes les publications
async function loadPublications() {
  const res = await fetch('/api/publications');
  const pubs = await res.json();
  pubsDiv.innerHTML = pubs.map(p => `
    <div class="publication">
      <strong>${p.titre}</strong> par ${p.auteur.fullname}<br>
      <p>${p.contenu}</p>
      ${p.image ? `<img src="${p.image}">` : ''}
      <small>${p.hashtags.join(' ')}</small>
    </div>
  `).join('');
}

// Chargement initial
loadPublications();
</script>
</body>
</html>
