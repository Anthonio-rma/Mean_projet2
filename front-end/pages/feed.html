<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threads</title>
  <link rel="stylesheet" href="../wwwroot/styles/feed.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="left-panel">
      <div class="brand-box">
        <h1>Thread</h1>
        <p>Réseau social minimal</p>
      </div>

      <div class="me-card">
        <div class="me-top">
          <a href="./profil.html">
            <img id="meImage" src="https://i.pravatar.cc/150?u=me" alt="Profil">
          </a>
          <div>
            <h3 id="meFullname">Utilisateur</h3>
            <p id="meUsername">@username</p>
          </div>
        </div>

        <p id="meBio" class="me-bio">Aucune bio</p>

        <div class="stats-row">
          <div class="stat-box">
            <strong id="meFollowers">0</strong>
            <span>Followers</span>
          </div>
          <div class="stat-box">
            <strong id="meFollowing">0</strong>
            <span>Following</span>
          </div>
        </div>
      </div>

      <div class="left-actions">
        <a class="nav-btn" href="/pages/message.html">Messagerie</a>
        <a class="nav-btn" href="./createStory.html">Story</a>
        <button class="nav-btn danger" id="logoutBtn">Déconnexion</button>
      </div>
    </aside>

    <main class="main-feed">
      <header class="feed-header">
        <div>
          <h2>Fil d’actualité</h2>
          <p>Publie, like, reposte et commente.</p>
        </div>
        <button class="outline-btn" id="refreshBtn">Actualiser</button>
      </header>

      <section class="composer-card">
        <textarea
          id="postContent"
          maxlength="500"
          placeholder="Quoi de neuf ? Tu peux mentionner quelqu’un avec @username"
        ></textarea>

        <div class="composer-bottom">
          <span id="charCount">0 / 500</span>
          <button id="publishBtn" class="primary-btn">Publier</button>
        </div>
      </section>

      <section class="feed-list" id="feedList">
        <div class="empty-box">Chargement du fil...</div>
      </section>
    </main>

    <aside class="right-panel">
      <div class="suggest-box">
        <div class="suggest-head">
          <h3>Suggestions</h3>
          <button class="small-btn" id="reloadUsersBtn">Recharger</button>
        </div>

        <div id="usersList"></div>
      </div>
    </aside>
  </div>

  <script src="../wwwroot/js/feed.js"></script>
</body>
</html>
